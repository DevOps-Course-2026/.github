name: Sync Docs to docs-hub (Reusable)

# Called by each repo's sync-docs.yml thin caller.
# Syncs docs/ and root .md files into docs-hub/docs/<repo>/.
#
# Known limitation: if a repo is deleted, its docs-hub namespace persists
# as an orphan. Clean up manually with: git rm -r docs/<repo>/

on:
  workflow_call:
    secrets:
      DOCS_HUB_SYNC_APP_ID:
        required: true
      DOCS_HUB_SYNC_APP_PRIVATE_KEY:
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DOCS_HUB_SYNC_APP_ID }}
          private-key: ${{ secrets.DOCS_HUB_SYNC_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: docs-hub

      - name: Checkout docs-hub
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/docs-hub
          token: ${{ steps.app-token.outputs.token }}
          path: docs-hub

      - name: Sync content
        run: |
          repo="${{ github.event.repository.name }}"
          repo="${repo#.}"  # strip leading dot (.github → github) — Docusaurus ignores dot-dirs
          dest="docs-hub/docs/${repo}"

          # Derive a friendly sidebar label from the repo name
          friendly_label() {
            local name="$1"
            name="${name//-/ }"  # hyphens → spaces
            # Title-case each word
            echo "$name" | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2))}1'
          }
          label="$(friendly_label "$repo")"

          # Wipe and rebuild — no orphans from any source
          rm -rf "${dest}"
          mkdir -p "${dest}"

          # 1. Copy docs/ tree (primary portal content)
          if [[ -d docs/ ]]; then
            rsync -av docs/ "${dest}/"
          fi

          # Helper: prepend frontmatter if file doesn't already have it
          prepend_frontmatter() {
            local src="$1" target="$2" extra_fm="${3:-}"
            if head -1 "$src" | grep -q '^---'; then
              cp "$src" "$target"
            else
              if [[ -n "$extra_fm" ]]; then
                printf -- '---\n%s\n---\n\n' "$extra_fm" | cat - "$src" > "$target"
              else
                printf -- '---\n---\n\n' | cat - "$src" > "$target"
              fi
            fi
          }

          # 2. Copy root README.md as the category landing page (index.md)
          if [[ -f README.md ]]; then
            target="${dest}/index.md"
            if [[ -f "$target" ]]; then
              echo "ERROR: README.md collides with docs/index.md — remove one." >&2
              exit 1
            fi
            prepend_frontmatter README.md "$target" "sidebar_label: ${label}"
          fi

          # 3. Copy other root .md files (CONTRIBUTING.md, SECURITY.md, etc.)
          for f in *.md; do
            [[ "$f" == "README.md" ]] && continue
            [[ -f "$f" ]] || continue  # guard against no match
            target="${dest}/${f,,}"     # lowercase filename
            if [[ -f "$target" ]]; then
              echo "ERROR: $f collides with docs/${f,,} — remove one." >&2
              exit 1
            fi
            prepend_frontmatter "$f" "$target"
          done

          # 4. Generate _category_.json if the repo didn't provide one via docs/
          if [[ ! -f "${dest}/_category_.json" ]]; then
            printf '{\n  "label": "%s"\n}\n' "$label" > "${dest}/_category_.json"
          fi

      - name: Commit and push
        run: |
          cd docs-hub
          repo="${{ github.event.repository.name }}"
          repo="${repo#.}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "docs/${repo}/"
          if git diff --cached --quiet; then
            echo "No changes to sync."
          else
            git commit -m "docs: sync from ${{ github.event.repository.name }}"
            git push
          fi
